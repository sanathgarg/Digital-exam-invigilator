<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="exam-page">

    <div class="exam-shell">
        <header class="exam-header exam-header-modern">
            <div>
                <p class="eyebrow">Digital Exam Invigilator</p>
                <h2 id="examTitleHeading">Online Examination</h2>
            </div>
            <div class="timer-card">
                <span class="timer-label">Time Left</span>
                <span id="time" class="timer-value">10:00</span>
            </div>
        </header>

        <main class="exam-content">
            <section class="dashboard-card exam-card">
                <div class="section-heading">
                    <h2>Exam Questions</h2>
                    <p>Answer all multiple-choice questions before submitting.</p>
                </div>

                <form id="examForm" class="question-list"></form>

                <div class="exam-actions">
                    <button type="button" onclick="submitExam()">Submit Exam</button>
                </div>
            </section>
        </main>
    </div>

    <div id="tabWarningPopup" class="warning-popup" role="alert" aria-live="assertive">
        Warning: Tab switching detected
    </div>

    <script src="exam.js"></script>

</body>
</html>
