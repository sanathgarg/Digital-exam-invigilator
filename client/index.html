<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-container login-card" id="loginCard">
      <p class="eyebrow">Digital Exam Invigilator</p>
      <h2>Secure Exam Access</h2>
      <p class="page-copy">Choose your role, then sign in with your student ID and password.</p>

      <div class="role-selector" id="roleSelector">
        <button type="button" class="role-button" data-role="student">Login as Student</button>
        <button type="button" class="role-button secondary-button" data-role="admin">Login as Admin</button>
      </div>

      <section id="loginFormSection" class="login-form-panel" aria-live="polite" hidden>
        <div class="selected-role-banner">
          <span id="selectedRoleLabel">Student Login</span>
          <button type="button" id="changeRoleButton" class="text-button">Change</button>
        </div>

        <div id="loginError" class="form-message" aria-live="polite"></div>

        <label class="field-group">
          <span>Student ID</span>
          <input id="studentId" placeholder="Enter your student ID" autocomplete="username">
        </label>

        <label class="field-group">
          <span>Password</span>
          <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
        </label>

        <button id="loginButton" type="button">Continue</button>
      </section>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
